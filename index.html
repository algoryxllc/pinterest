<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Finds Daily — Blog Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --border: #2a2a30;
    --accent: #f0a500;
    --text: #f0ede8;
    --muted: #888;
    --green: #4caf7d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 30px 20px;
  }
  .container { max-width: 860px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--accent); }
  header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .niche-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .niche-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 10px 14px;
    text-align: left;
    transition: all 0.2s;
  }
  .niche-btn:hover { border-color: var(--accent); color: var(--text); }
  .niche-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .products-grid { display: flex; flex-direction: column; gap: 14px; }
  .product-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .product-num { font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }

  .product-preview {
    display: none;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
    padding: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .product-preview img { width: 64px; height: 64px; object-fit: contain; border-radius: 6px; background: #fff; padding: 4px; flex-shrink: 0; }
  .product-preview .prod-title { font-size: 0.82rem; color: var(--text); line-height: 1.4; }
  .fetch-status { font-size: 0.75rem; margin-top: 4px; }
  .fetch-status.ok { color: var(--green); }
  .fetch-status.err { color: #e87a7a; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 12px 24px;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
    justify-content: center;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-copy { background: var(--green); margin-top: 16px; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); margin-top: 8px; }

  .status {
    border-radius: 8px;
    font-size: 0.85rem;
    margin-top: 12px;
    padding: 10px 14px;
    display: none;
  }
  .status.info { background: #1a2a3a; border: 1px solid #2a4a6a; color: #7ab8e8; display: block; }
  .status.error { background: #2a1a1a; border: 1px solid #5a2a2a; color: #e87a7a; display: block; }
  .status.success { background: #1a2a1a; border: 1px solid #2a5a2a; color: #7ae87a; display: block; }

  .output-area { display: none; margin-top: 20px; }
  .output-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 6px 14px;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  #previewPane, #htmlPane {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  #previewPane { line-height: 1.7; }
  #previewPane h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 8px; }
  #previewPane h3 { font-size: 1rem; color: var(--text); margin: 18px 0 6px; }
  #previewPane p { color: #ccc; font-size: 0.9rem; margin-bottom: 8px; }
  #previewPane a { color: var(--accent); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
  #previewPane .prod-card { border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 12px 0; display: flex; gap: 14px; align-items: flex-start; }
  #previewPane .prod-card img { width: 90px; height: 90px; object-fit: contain; border-radius: 6px; background: #fff; padding: 4px; flex-shrink: 0; }
  #previewPane .prod-card .prod-info { flex: 1; }
  #previewPane .disclosure { font-size: 0.78rem; color: var(--muted); margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--border); }

  #htmlPane {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: #aaa;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #0005;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .api-toggle { font-size: 0.78rem; color: var(--accent); cursor: pointer; float: right; }
  .hint { font-size: 0.75rem; color: var(--muted); margin-top: 5px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>🏠 Home Finds Daily</h1>
    <p>Paste Amazon links — title & image load automatically, AI writes the blog</p>
  </header>

  <div class="card">
    <div class="card-title">🔑 Groq API Key <span class="api-toggle" onclick="toggleKey()">show/hide</span></div>
    <input type="password" id="apiKey" placeholder="Paste your Groq API key here..." />
  </div>

  <div class="card">
    <div class="card-title">📂 Select Niche</div>
    <div class="niche-grid">
      <button class="niche-btn active" data-niche="home">🏠 Home Finds</button>
      <button class="niche-btn" data-niche="kitchen">🍳 Kitchen Products</button>
      <button class="niche-btn" data-niche="beauty">💄 Beauty & Skincare</button>
      <button class="niche-btn" data-niche="decor">🌿 Home Decor</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📦 Products (up to 5)</div>
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <button class="btn" id="generateBtn" onclick="generate()">✨ Generate Blog Post</button>
  <div class="status" id="status"></div>

  <div class="output-area" id="outputArea">
    <div class="output-tabs">
      <button class="tab-btn active" onclick="switchTab('preview', event)">👁 Preview</button>
      <button class="tab-btn" onclick="switchTab('html', event)">📋 HTML</button>
    </div>
    <div id="previewPane"></div>
    <div id="htmlPane" style="display:none;"></div>
    <button class="btn btn-copy" onclick="copyHTML()">📋 Copy Blog HTML → Paste into Blogger</button>
    <button class="btn btn-secondary" onclick="resetForm()">🔄 Generate Another</button>
  </div>

</div>
<script>
const TITLES = {
  home: ["Best Home Finds on Amazon Under $20","Viral Home Finds on Amazon Everyone's Buying","Must Have Home Finds on Amazon Right Now","Life Changing Home Finds on Amazon","Trending Home Finds on Amazon 2026","Hidden Gem Home Finds on Amazon Under $15","Top Home Finds on Amazon That Actually Work","Best Value Home Finds on Amazon This Year","Home Finds on Amazon Everyone Is Obsessing Over","Cheap Home Finds on Amazon That Look Expensive"],
  kitchen: ["Best Kitchen Products on Amazon Under $25","Viral Kitchen Products on Amazon Everyone Loves","Must Have Kitchen Products on Amazon Right Now","Life Changing Kitchen Products on Amazon","Trending Kitchen Products on Amazon 2026","Top Kitchen Products on Amazon That Save Time","Best Value Kitchen Products on Amazon","Kitchen Products on Amazon Everyone Is Obsessing Over","Best Kitchen Gadgets on Amazon Right Now","Viral Kitchen Products on Amazon Worth Buying"],
  beauty: ["Best Beauty & Skincare on Amazon Under $15","Viral Beauty & Skincare on Amazon Everyone Loves","Must Have Beauty & Skincare on Amazon Right Now","Life Changing Beauty & Skincare on Amazon","Trending Beauty & Skincare on Amazon 2026","Top Beauty & Skincare on Amazon That Actually Work","Best Value Beauty & Skincare on Amazon","Beauty & Skincare on Amazon Everyone Is Obsessing Over","Best Beauty Finds on Amazon Right Now","Viral Skincare on Amazon Worth Buying"],
  decor: ["Best Home Decor on Amazon Under $30","Viral Home Decor on Amazon Everyone's Buying","Must Have Home Decor on Amazon Right Now","Life Changing Home Decor on Amazon","Trending Home Decor on Amazon 2026","Top Home Decor on Amazon That Look Expensive","Best Value Home Decor on Amazon This Year","Home Decor on Amazon Everyone Is Obsessing Over","Best Home Decor Finds on Amazon Right Now","Viral Home Decor on Amazon Worth the Hype"]
};
const INTROS = {
  home: ["If you're tired of scrolling endlessly for useful stuff, these Amazon home finds might just solve that problem.","These Amazon home finds are the kind of buys that make you wonder why you didn't get them sooner.","Small changes can make a big difference. These affordable Amazon home finds prove exactly that.","Here are the most talked-about Amazon home finds that real people are loving right now."],
  kitchen: ["Cooking and cleaning just got a lot easier thanks to these clever Amazon kitchen products.","These Amazon kitchen products get used every single day — not just once and forgotten.","Simple, practical, and surprisingly affordable — here are the best Amazon kitchen products right now.","If your kitchen routine needs a refresh, these smart Amazon kitchen products can help."],
  beauty: ["Good skincare doesn't have to be expensive. These Amazon beauty and skincare finds prove it.","These Amazon beauty and skincare finds are the ones people quietly repurchase again and again.","Simple, effective, and budget-friendly — these are the Amazon beauty finds everyone's talking about.","These Amazon beauty products make you feel good without breaking the bank."],
  decor: ["If your space feels empty, these Amazon home decor finds are the fix.","Want to transform your room without a full renovation? These Amazon decor picks make it easy.","Small decor upgrades can transform a space. These affordable Amazon finds prove exactly that.","Here are the most loved Amazon home decor pieces that real people keep buying and gifting."]
};

let selectedNiche = 'home';
let generatedHTML = '';
const productData = {};

function buildProductRows() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    grid.innerHTML += `
      <div class="product-row" id="row${i}">
        <div class="product-num">Product ${i}</div>
        <label>Amazon Affiliate Link</label>
        <input type="text" id="link${i}" placeholder="https://amzn.to/... or full Amazon URL" />
        <p class="hint">Paste link → click away → title & image load automatically</p>
        <div class="product-preview" id="preview${i}">
          <img id="img${i}" src="" alt="" onerror="this.style.display='none'" />
          <div>
            <div class="prod-title" id="ptitle${i}"></div>
            <div class="fetch-status" id="fstatus${i}"></div>
          </div>
        </div>
      </div>`;

    // attach blur listener after DOM settles
    setTimeout(() => {
      const inp = document.getElementById('link' + i);
      if (inp) inp.addEventListener('blur', () => fetchProduct(i));
    }, 0);
  }
}

document.querySelectorAll('.niche-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.niche-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedNiche = btn.dataset.niche;
  });
});

function toggleKey() {
  const k = document.getElementById('apiKey');
  k.type = k.type === 'password' ? 'text' : 'password';
}
function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + type;
}
function switchTab(tab, e) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('previewPane').style.display = tab === 'preview' ? 'block' : 'none';
  document.getElementById('htmlPane').style.display = tab === 'html' ? 'block' : 'none';
}
function copyHTML() {
  navigator.clipboard.writeText(generatedHTML).then(() => {
    setStatus('✅ Copied! Open Blogger → New Post → HTML view → Paste → Publish', 'success');
  });
}
function resetForm() {
  document.getElementById('outputArea').style.display = 'none';
  document.getElementById('status').className = 'status';
  window.scrollTo(0, 0);
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

async function fetchProduct(i) {
  const rawUrl = document.getElementById('link' + i).value.trim();
  if (!rawUrl) return;

  const previewEl = document.getElementById('preview' + i);
  const titleEl   = document.getElementById('ptitle' + i);
  const imgEl     = document.getElementById('img' + i);
  const statusEl  = document.getElementById('fstatus' + i);

  previewEl.style.display = 'flex';
  imgEl.style.display = 'block';
  titleEl.textContent = '⏳ Fetching...';
  statusEl.textContent = '';
  statusEl.className = 'fetch-status';

  try {
    // Use allorigins proxy — handles redirects from amzn.to automatically
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(rawUrl)}`;
    const res = await fetch(proxy);
    if (!res.ok) throw new Error('Proxy error ' + res.status);
    const json = await res.json();
    const html = json.contents || '';
    if (!html) throw new Error('Empty response from proxy');

    // --- Extract title ---
    let title = '';
    // og:title is most reliable
    const ogT = html.match(/<meta[^>]+property=["']og:title["'][^>]+content=["']([^"']{5,})["']/i)
             || html.match(/<meta[^>]+content=["']([^"']{5,})["'][^>]+property=["']og:title["']/i);
    if (ogT) title = ogT[1];
    if (!title) {
      const tagT = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
      if (tagT) title = tagT[1].replace(/\s*[:\-|]\s*Amazon\.(com|co\.\w+|in|de|fr|es|it).*$/i, '').trim();
    }
    title = title.replace(/&amp;/g,'&').replace(/&#(\d+);/g,(_,n)=>String.fromCharCode(n)).trim();
    if (title.length > 130) title = title.substring(0, 130) + '...';

    // --- Extract image ---
    let image = '';
    // Try og:image
    const ogI = html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
             || html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
    if (ogI) image = ogI[1];

    // Try data-old-hires (high-res Amazon main image)
    if (!image) {
      const hires = html.match(/data-old-hires=["']([^"']+\.jpg[^"']*)["']/i);
      if (hires) image = hires[1];
    }
    // Try landingImage src
    if (!image) {
      const landing = html.match(/id=["']landingImage["'][^>]+src=["']([^"']+)["']/i);
      if (landing) image = landing[1];
    }
    // Try imgTagWrapper img src
    if (!image) {
      const wrapper = html.match(/imgTagWrapper[\s\S]{0,300}?src=["']([^"']+\.jpg[^"']*)["']/i);
      if (wrapper) image = wrapper[1];
    }

    if (!title) throw new Error('Could not parse product title');

    productData[i] = { title, image, link: rawUrl };
    titleEl.textContent = title;
    statusEl.textContent = '✅ Loaded';
    statusEl.className = 'fetch-status ok';

    if (image) {
      imgEl.src = image;
    } else {
      imgEl.style.display = 'none';
      statusEl.textContent += ' (no image found)';
    }

  } catch (err) {
    titleEl.textContent = 'Auto-fetch failed. Amazon blocked the request.';
    statusEl.textContent = '⚠️ Type the product name manually below';
    statusEl.className = 'fetch-status err';
    productData[i] = { title: '', image: '', link: rawUrl };

    // Add manual name input if not already there
    if (!document.getElementById('manual' + i)) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.id = 'manual' + i;
      inp.placeholder = 'Type product name manually (e.g. Cat Food Topper)...';
      inp.style.marginTop = '8px';
      inp.addEventListener('input', () => {
        productData[i] = { ...productData[i], title: inp.value.trim() };
      });
      document.getElementById('row' + i).appendChild(inp);
    }
  }
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('❌ Enter your Groq API key first.', 'error'); return; }

  const products = [];
  for (let i = 1; i <= 5; i++) {
    const link = document.getElementById('link' + i).value.trim();
    if (!link) continue;
    const d = productData[i] || {};
    const manualEl = document.getElementById('manual' + i);
    const title = d.title || (manualEl ? manualEl.value.trim() : '');
    if (!title) {
      setStatus(`❌ Product ${i}: No title found. Wait for fetch or type manually.`, 'error');
      return;
    }
    products.push({ title, image: d.image || '', link });
  }
  if (products.length === 0) { setStatus('❌ Add at least 1 Amazon link.', 'error'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Writing blog...';
  setStatus('⏳ Groq AI is writing your blog post...', 'info');

  const blogTitle = pick(TITLES[selectedNiche]);
  const intro     = pick(INTROS[selectedNiche]);
  const productPrompt = products.map((p, i) => `Product ${i+1}: ${p.title}`).join('\n');

  const prompt = `You are an Amazon affiliate blog writer. Write accurate, engaging descriptions strictly based on the product names below.

Return ONLY a raw valid JSON array. No markdown. No backticks. One object per product:
- "title": Short catchy name (max 6 words, based on the actual product)
- "description": 2 sentences about why someone would want this product. Be accurate.

${productPrompt}

Example output: [{"title":"Nonstick Ceramic Pan","description":"Cooks evenly without sticking. Easy to clean and PFOA free."}]`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify({
        model: 'llama3-8b-8192',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7,
        max_tokens: 800
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Groq error');

    const raw = data.choices[0].message.content.trim().replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);

    let html = `<h2>${blogTitle}</h2>\n<p>${intro}</p>\n\n`;
    let previewHTML = `<h2>${blogTitle}</h2><p style="color:#aaa;font-size:0.9rem;margin-bottom:16px;">${intro}</p>`;

    parsed.forEach((prod, i) => {
      const { link, image } = products[i];
      const imgTagHTML = image ? `<img src="${image}" alt="${prod.title}" style="max-width:200px;display:block;margin:8px 0;border-radius:8px;" />\n` : '';
      const imgPreview = image ? `<img src="${image}" alt="${prod.title}" />` : '';

      html += `<h3>${i+1}. ${prod.title}</h3>\n${imgTagHTML}<p>${prod.description}</p>\n<p><a href="${link}" target="_blank" rel="nofollow">✅ Check Price on Amazon →</a></p>\n\n`;
      previewHTML += `<div class="prod-card">${imgPreview}<div class="prod-info"><h3>${i+1}. ${prod.title}</h3><p>${prod.description}</p><a href="${link}" target="_blank">✅ Check Price on Amazon →</a></div></div>`;
    });

    html += `<p><em>Disclosure: This post contains affiliate links. I may earn a small commission at no extra cost to you.</em></p>`;
    previewHTML += `<div class="disclosure">Disclosure: This post contains affiliate links. I may earn a small commission at no extra cost to you.</div>`;

    generatedHTML = html;
    document.getElementById('previewPane').innerHTML = previewHTML;
    document.getElementById('htmlPane').textContent = html;
    document.getElementById('outputArea').style.display = 'block';
    setStatus('✅ Blog post ready!', 'success');
    document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });

  } catch (err) {
    setStatus('❌ Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ Generate Blog Post';
  }
}

buildProductRows();
</script>
</body>
</html>
