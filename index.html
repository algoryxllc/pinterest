<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Finds Daily — Blog Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #17171a;
    --border: #2a2a30;
    --accent: #f0a500;
    --accent2: #e05c5c;
    --text: #f0ede8;
    --muted: #888;
    --green: #4caf7d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 30px 20px;
  }
  .container { max-width: 860px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }

  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: #1e1e22; }

  .niche-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .niche-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    padding: 10px 14px;
    text-align: left;
    transition: all 0.2s;
  }
  .niche-btn:hover { border-color: var(--accent); color: var(--text); }
  .niche-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .products-grid { display: flex; flex-direction: column; gap: 14px; }
  .product-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .product-num {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 12px 24px;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
    justify-content: center;
    margin-top: 8px;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-copy {
    background: var(--green);
    margin-top: 16px;
  }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 8px;
  }

  .status {
    border-radius: 8px;
    font-size: 0.85rem;
    margin-top: 12px;
    padding: 10px 14px;
    display: none;
  }
  .status.info { background: #1a2a3a; border: 1px solid #2a4a6a; color: #7ab8e8; display: block; }
  .status.error { background: #2a1a1a; border: 1px solid #5a2a2a; color: #e87a7a; display: block; }
  .status.success { background: #1a2a1a; border: 1px solid #2a5a2a; color: #7ae87a; display: block; }

  .output-area {
    display: none;
    margin-top: 20px;
  }
  .output-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .tab-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 6px 14px;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  #previewPane, #htmlPane {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  #previewPane { line-height: 1.7; }
  #previewPane h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--accent); margin-bottom: 8px; }
  #previewPane h3 { font-size: 1rem; color: var(--text); margin: 18px 0 6px; }
  #previewPane p { color: #ccc; font-size: 0.9rem; margin-bottom: 8px; }
  #previewPane a { color: var(--accent); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
  #previewPane .prod-card { border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin: 12px 0; }
  #previewPane img { max-width: 120px; border-radius: 6px; margin-top: 8px; }
  #previewPane .disclosure { font-size: 0.78rem; color: var(--muted); margin-top: 20px; padding-top: 12px; border-top: 1px solid var(--border); }

  #htmlPane {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: #aaa;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #0005;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .api-toggle { font-size: 0.78rem; color: var(--accent); cursor: pointer; float: right; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>🏠 Home Finds Daily</h1>
    <p>Blog Post Generator — Paste links, get a ready blog post</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <div class="card-title">🔑 Groq API Key <span class="api-toggle" onclick="toggleKey()">show/hide</span></div>
    <input type="password" id="apiKey" placeholder="Paste your Groq API key here..." />
  </div>

  <!-- Niche -->
  <div class="card">
    <div class="card-title">📂 Select Niche</div>
    <div class="niche-grid">
      <button class="niche-btn active" data-niche="home">🏠 Home Finds</button>
      <button class="niche-btn" data-niche="kitchen">🍳 Kitchen Products</button>
      <button class="niche-btn" data-niche="beauty">💄 Beauty & Skincare</button>
      <button class="niche-btn" data-niche="decor">🌿 Home Decor</button>
    </div>
  </div>

  <!-- Products -->
  <div class="card">
    <div class="card-title">📦 Products (up to 5)</div>
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <!-- Generate -->
  <button class="btn" id="generateBtn" onclick="generate()">
    ✨ Generate Blog Post
  </button>
  <div class="status" id="status"></div>

  <!-- Output -->
  <div class="output-area" id="outputArea">
    <div class="output-tabs">
      <button class="tab-btn active" onclick="switchTab('preview')">👁 Preview</button>
      <button class="tab-btn" onclick="switchTab('html')">📋 Copy HTML</button>
    </div>
    <div id="previewPane"></div>
    <div id="htmlPane" style="display:none;"></div>
    <button class="btn btn-copy" onclick="copyHTML()">📋 Copy Blog HTML → Paste into Blogger</button>
    <button class="btn btn-secondary" onclick="resetForm()">🔄 Generate Another</button>
  </div>

</div>

<script>
// ---- DATA ----
const TITLES = {
  home: ["Best Home Finds on Amazon Under $20","Viral Home Finds on Amazon Everyone's Buying","Must Have Home Finds on Amazon Right Now","Life Changing Home Finds on Amazon","Trending Home Finds on Amazon 2026","Hidden Gem Home Finds on Amazon Under $15","Top Home Finds on Amazon That Actually Work","Best Value Home Finds on Amazon This Year","Home Finds on Amazon Everyone Is Obsessing Over","Cheap Home Finds on Amazon That Look Expensive","Popular Home Finds on Amazon You Need","Home Finds on Amazon That Changed My Space","Amazon Home Finds That Save Time","Best Home Finds on Amazon Under $25","Viral Home Finds on Amazon Worth Buying","Must Try Home Finds on Amazon Right Now","Home Finds on Amazon With Amazing Reviews","Trending Home Finds on Amazon You Can't Miss","Home Finds on Amazon That Exceeded Expectations","Best Selling Home Finds on Amazon","Home Finds on Amazon Everyone Should Try","Affordable Home Finds on Amazon You'll Love","Top Rated Home Finds on Amazon 2026","Home Finds on Amazon That Made a Big Difference","Hidden Home Finds on Amazon Under $10","Home Finds on Amazon That Are Always Sold Out","Best Home Finds on Amazon for Small Spaces","Viral Home Finds on Amazon That Work Perfectly","Home Finds on Amazon You'll Repurchase","Must Have Home Finds on Amazon This Month"],
  kitchen: ["Best Kitchen Products on Amazon Under $25","Viral Kitchen Products on Amazon Everyone Loves","Must Have Kitchen Products on Amazon Right Now","Life Changing Kitchen Products on Amazon","Trending Kitchen Products on Amazon 2026","Hidden Gem Kitchen Products on Amazon Under $15","Top Kitchen Products on Amazon That Save Time","Best Value Kitchen Products on Amazon","Kitchen Products on Amazon Everyone Is Obsessing Over","Cheap Kitchen Products on Amazon That Perform Amazing","Popular Kitchen Products on Amazon You Need","Kitchen Products on Amazon That Changed My Cooking","Best Kitchen Gadgets on Amazon Right Now","Viral Kitchen Products on Amazon Worth Buying","Must Try Kitchen Products on Amazon Under $20","Kitchen Products on Amazon With Amazing Reviews","Trending Kitchen Products on Amazon You Can't Miss","Kitchen Products on Amazon That Exceeded Expectations","Best Selling Kitchen Products on Amazon","Kitchen Products on Amazon Everyone Should Try","Affordable Kitchen Products on Amazon You'll Love","Top Rated Kitchen Products on Amazon 2026","Kitchen Products on Amazon That I Use Daily","Hidden Kitchen Products on Amazon Under $10","Kitchen Products on Amazon That Are Always Sold Out","Best Kitchen Finds on Amazon This Year","Viral Kitchen Tools on Amazon Going Viral","Kitchen Products on Amazon You'll Repurchase","Must Have Kitchen Products on Amazon Under $30","Kitchen Products on Amazon That Actually Deliver"],
  beauty: ["Best Beauty & Skincare on Amazon Under $15","Viral Beauty & Skincare on Amazon Everyone Loves","Must Have Beauty & Skincare on Amazon Right Now","Life Changing Beauty & Skincare on Amazon","Trending Beauty & Skincare on Amazon 2026","Hidden Gem Beauty & Skincare on Amazon Under $20","Top Beauty & Skincare on Amazon That Actually Work","Best Value Beauty & Skincare on Amazon","Beauty & Skincare on Amazon Everyone Is Obsessing Over","Cheap Beauty & Skincare on Amazon That Deliver Results","Popular Beauty & Skincare on Amazon You Need","Beauty & Skincare on Amazon That Changed My Skin","Best Beauty Finds on Amazon Right Now","Viral Skincare on Amazon Worth Buying","Must Try Beauty & Skincare on Amazon Under $25","Beauty & Skincare on Amazon With Amazing Reviews","Trending Beauty & Skincare on Amazon You Can't Miss","Beauty & Skincare on Amazon That Exceeded Expectations","Best Selling Beauty & Skincare on Amazon","Beauty & Skincare on Amazon Everyone Should Try","Affordable Beauty & Skincare on Amazon You'll Love","Top Rated Beauty & Skincare on Amazon 2026","Beauty & Skincare on Amazon for Glowing Skin","Hidden Beauty & Skincare on Amazon Under $10","Beauty & Skincare on Amazon That Are Always Sold Out","Best Beauty Products on Amazon This Year","Viral Beauty & Skincare on Amazon Going Viral","Beauty & Skincare on Amazon You'll Repurchase","Must Have Beauty & Skincare on Amazon This Month","Beauty & Skincare on Amazon That Actually Work"],
  decor: ["Best Home Decor on Amazon Under $30","Viral Home Decor on Amazon Everyone's Buying","Must Have Home Decor on Amazon Right Now","Life Changing Home Decor on Amazon","Trending Home Decor on Amazon 2026","Hidden Gem Home Decor on Amazon Under $15","Top Home Decor on Amazon That Look Expensive","Best Value Home Decor on Amazon This Year","Home Decor on Amazon Everyone Is Obsessing Over","Cheap Home Decor on Amazon That Looks Amazing","Popular Home Decor on Amazon You Need","Home Decor on Amazon That Transformed My Room","Best Home Decor Finds on Amazon Right Now","Viral Home Decor on Amazon Worth the Hype","Must Try Home Decor on Amazon Under $25","Home Decor on Amazon With Amazing Reviews","Trending Home Decor on Amazon You Can't Miss","Home Decor on Amazon That Exceeded Expectations","Best Selling Home Decor on Amazon","Home Decor on Amazon Everyone Should Try","Affordable Home Decor on Amazon You'll Love","Top Rated Home Decor on Amazon 2026","Home Decor on Amazon That Made a Big Difference","Hidden Home Decor on Amazon Under $10","Home Decor on Amazon That Are Always Sold Out","Best Home Decor on Amazon for Small Rooms","Viral Home Decor on Amazon Going Viral","Home Decor on Amazon You'll Repurchase","Must Have Home Decor on Amazon This Month","Home Decor on Amazon That Looks Expensive on Budget"]
};

const INTROS = {
  home: ["If you're tired of scrolling endlessly for useful stuff, these Amazon home finds might just solve that problem.","I've rounded up the most practical and clever home finds on Amazon that actually make daily life easier.","Looking for simple ways to upgrade your space without spending a fortune? These Amazon home finds deliver.","These aren't just random picks — these Amazon home finds are the ones people keep coming back to.","Want to make your home feel more organized and comfortable? Start with these hidden gems on Amazon.","From smart storage to everyday essentials, these Amazon home finds are changing how people live at home.","If you're always hunting for useful things that actually work, you'll want to see these Amazon home finds.","These Amazon home finds are the kind of buys that make you wonder why you didn't get them sooner.","Small changes can make a big difference. These affordable Amazon home finds prove exactly that.","Here are the most talked-about Amazon home finds that real people are loving right now."],
  kitchen: ["Cooking and cleaning just got a lot easier thanks to these clever Amazon kitchen products.","If your kitchen needs a quiet upgrade, these Amazon kitchen products might be exactly what you need.","I tried dozens of gadgets so you don't have to — these Amazon kitchen products are the real winners.","From quick meals to easy cleanup, these Amazon kitchen products are making kitchens more efficient.","Looking for tools that actually save time in the kitchen? These Amazon finds are worth checking out.","These aren't fancy gadgets you'll use once — these Amazon kitchen products get used every single day.","Want to make cooking more fun and less stressful? Start with these popular Amazon kitchen products.","Simple, practical, and surprisingly affordable — here are the best Amazon kitchen products right now.","These Amazon kitchen products are the kind that make you say \"why didn't I buy this earlier?\"","If your kitchen routine needs a refresh, these smart Amazon kitchen products can help."],
  beauty: ["Good skincare doesn't have to be expensive. These Amazon beauty and skincare finds prove it.","I've tested so many products, and these Amazon beauty and skincare finds actually deliver results.","Want glowing skin without complicated routines? These Amazon beauty and skincare picks keep it simple.","These Amazon beauty and skincare finds are the ones people quietly repurchase again and again.","From daily essentials to hidden gems, these Amazon beauty and skincare products are worth knowing about.","If you're tired of wasting money on products that don't work, try these Amazon beauty and skincare favorites.","Simple, effective, and budget-friendly — these are the Amazon beauty and skincare finds everyone's talking about.","Looking for skincare that fits easily into your routine? These Amazon finds might be your new go-to.","These Amazon beauty and skincare products are the kind that make you feel good without breaking the bank.","Ready to upgrade your beauty routine? These underrated Amazon beauty and skincare finds are a great place to start."],
  decor: ["If your walls feel bare and your space feels empty, these Amazon home decor finds are the fix.","I've rounded up the most stylish and affordable home decor on Amazon that actually looks expensive.","Want to transform your room without a full renovation? These Amazon home decor picks make it easy.","These aren't just decorations — these Amazon home decor finds are conversation starters.","Looking for pieces that add personality to your space? These Amazon decor finds deliver every time.","From modern minimalist to cozy aesthetic, these Amazon home decor finds work for every style.","These Amazon home decor finds are the kind of buys that instantly make your home feel complete.","Small decor upgrades can transform a space. These affordable Amazon finds prove exactly that.","Here are the most loved Amazon home decor pieces that real people keep buying and gifting.","If your space needs a refresh, these trending Amazon home decor finds are a great place to start."]
};

let selectedNiche = 'home';
let generatedHTML = '';

// Build product rows
function buildProductRows() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    grid.innerHTML += `
      <div class="product-row">
        <div class="product-num">Product ${i}</div>
        <label>Amazon Affiliate Link</label>
        <input type="text" id="link${i}" placeholder="https://amzn.to/..." />
        <label>Short Description / Bullet Points</label>
        <textarea id="desc${i}" placeholder="e.g. Perfect for small kitchens. Saves counter space. Dishwasher safe."></textarea>
      </div>`;
  }
}

// Niche selection
document.querySelectorAll('.niche-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.niche-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedNiche = btn.dataset.niche;
  });
});

function toggleKey() {
  const k = document.getElementById('apiKey');
  k.type = k.type === 'password' ? 'text' : 'password';
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status ' + type;
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('previewPane').style.display = tab === 'preview' ? 'block' : 'none';
  document.getElementById('htmlPane').style.display = tab === 'html' ? 'block' : 'none';
}

function copyHTML() {
  navigator.clipboard.writeText(generatedHTML).then(() => {
    setStatus('✅ HTML copied! Now open Blogger → New Post → Switch to HTML view → Paste → Publish', 'success');
  });
}

function resetForm() {
  document.getElementById('outputArea').style.display = 'none';
  document.getElementById('status').className = 'status';
  window.scrollTo(0, 0);
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('❌ Please enter your Groq API key first.', 'error'); return; }

  const products = [];
  for (let i = 1; i <= 5; i++) {
    const link = document.getElementById('link' + i).value.trim();
    const desc = document.getElementById('desc' + i).value.trim();
    if (link) products.push({ link, desc });
  }
  if (products.length === 0) { setStatus('❌ Add at least 1 product link.', 'error'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  setStatus('⏳ Talking to Groq AI...', 'info');

  const blogTitle = pick(TITLES[selectedNiche]);
  const intro = pick(INTROS[selectedNiche]);

  const productPrompt = products.map((p, i) => `Product ${i+1}:\nLink: ${p.link}\nNotes: ${p.desc || 'No notes provided'}`).join('\n\n');

  const prompt = `You are a product blog writer. Given the following Amazon products, return a JSON array (no markdown, no backticks, just raw JSON array) with one object per product. Each object must have:
- "title": A short catchy product name (max 6 words, no brand codes or brackets)
- "description": 2 sentences max describing why someone would want this product. Use the notes provided.

${productPrompt}

Return ONLY a valid JSON array. Example: [{"title":"Nonstick Frying Pan","description":"Perfect for everyday cooking. Easy to clean and PFOA free."}]`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'llama-3.1-8b-instant',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7,
        max_tokens: 800
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'Groq API error');

    const raw = data.choices[0].message.content.trim();
    const parsed = JSON.parse(raw);

    // Build HTML
    let html = `<h2>${blogTitle}</h2>\n<p>${intro}</p>\n\n`;
    let previewHTML = `<h2>${blogTitle}</h2><p style="color:#aaa;font-size:0.9rem;margin-bottom:16px;">${intro}</p>`;

    parsed.forEach((prod, i) => {
      const link = products[i].link;
      html += `<h3>${i+1}. ${prod.title}</h3>\n<p>${prod.description}</p>\n<p><a href="${link}" target="_blank" rel="nofollow">✅ Check Price on Amazon →</a></p>\n\n`;
      previewHTML += `<div class="prod-card"><h3>${i+1}. ${prod.title}</h3><p>${prod.description}</p><a href="${link}" target="_blank">✅ Check Price on Amazon →</a></div>`;
    });

    const disclosure = `<p><em>Disclosure: This post contains affiliate links. I may earn a small commission at no extra cost to you.</em></p>`;
    html += disclosure;
    previewHTML += `<div class="disclosure">Disclosure: This post contains affiliate links. I may earn a small commission at no extra cost to you.</div>`;

    generatedHTML = html;

    document.getElementById('previewPane').innerHTML = previewHTML;
    document.getElementById('htmlPane').textContent = html;
    document.getElementById('outputArea').style.display = 'block';
    setStatus('✅ Blog post ready! Copy HTML and paste into Blogger.', 'success');
    document.getElementById('outputArea').scrollIntoView({ behavior: 'smooth' });

  } catch (err) {
    setStatus('❌ Error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ Generate Blog Post';
  }
}

buildProductRows();
</script>
</body>
</html>
